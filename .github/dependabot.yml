version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/kotlin-js-store"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    groups:
      all:
        patterns:
          - "*"
